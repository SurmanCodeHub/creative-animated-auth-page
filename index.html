<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surman Code Hub - Fixed Cinematic Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stage">
        <div class="intro-screen">
            <h1 id="textHub" class="cine-title">Surman Code Hub</h1>
            <h2 id="textFounder" class="cine-subtitle">Founder & CEO | Lead Developer<br><span style="color:#fff; font-size:32px;">Vishal Kumar</span></h2>
        </div>

        <div class="laptop-workspace" id="laptopCore">
            
            <div class="screen-interface signup-mode" id="formFrame">
                
                <div class="form-header">
                    <h2 id="formHeading">Surman Code Hub Signup Form</h2>
                </div>

                <div class="form-tabs">
                    <button class="tab-btn active-signup" id="tabSignup">Sign Up</button>
                    <button class="tab-btn" id="tabLogin">Log In</button>
                </div>

                <div id="boxSignup" class="panel-box active">
                    <input type="text" placeholder="Dev Username" autocomplete="off">
                    <input type="email" placeholder="Developer Email" autocomplete="off">
                    <input type="password" placeholder="Access Password" autocomplete="off">
                    <button class="action-btn">Initialize Hub Account 🚀</button>
                </div>

                <div id="boxLogin" class="panel-box">
                    <input type="text" placeholder="Username / Alias" autocomplete="off">
                    <input type="password" placeholder="Security Key" autocomplete="off">
                    <button class="action-btn">Execute Token Login 🔐</button>
                </div>

            </div>

            <div class="laptop-base"></div>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
